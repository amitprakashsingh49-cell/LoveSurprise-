<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Question ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#ff9ecf,#ff5f95);
overflow:hidden;
}

.box{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 0 20px pink;
width:90%;
max-width:350px;
}

h2{
color:#ff1493;
margin-bottom:25px;
}

button{
padding:12px 25px;
font-size:20px;
border:none;
border-radius:12px;
margin:10px;
cursor:pointer;
}

.yes{
background:#ff1493;
color:white;
}

.no{
background:#ddd;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
}

.popup img{
width:250px;
border-radius:15px;
}
</style>

</head>

<body>

<div class="box">

<h2>🥺 Kya Aap Ye Special Gift Dekhna Chahenge?</h2>

<button class="yes" onclick="yesClick()">Yes ❤️</button>

<button class="no" onclick="noClick()">No 💔</button>

</div>

<div id="noGif" class="popup">
<img src="images/no.gif">
</div>

<div id="yesGif" class="popup">
<img src="images/yes.gif">
</div>

<script>

function noClick(){

document.getElementById("noGif").style.display="flex";

setTimeout(function(){

document.getElementById("noGif").style.display="none";

},1500);

}

function yesClick(){

document.getElementById("yesGif").style.display="flex";

setTimeout(function(){

window.location.href="gallery.html";

},2000);

}

</script>

</body>
</html>
